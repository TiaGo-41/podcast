<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes Révisions ✦</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ── Variables ── */
    :root {
      --bg:       #f5f0e8;
      --surface:  #fffdf7;
      --surface2: #fdf6e3;
      --text:     #2c2417;
      --muted:    #8a7d68;
      --border:   #e0d5c0;

      --yellow:   #fde68a;
      --yellow-d: #b45309;
      --pink:     #fecdd3;
      --pink-d:   #9f1239;
      --mint:     #bbf7d0;
      --mint-d:   #065f46;
      --lavender: #ddd6fe;
      --lav-d:    #4c1d95;
      --sky:      #bae6fd;
      --sky-d:    #0c4a6e;
      --peach:    #fed7aa;
      --peach-d:  #7c2d12;

      --accent:   #d97706;
      --radius-sm: 12px;
      --radius-md: 18px;
      --radius-lg: 24px;
      --shadow: 3px 4px 0px rgba(44, 36, 23, 0.12);
      --shadow-hover: 5px 7px 0px rgba(44, 36, 23, 0.16);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Grain texture ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 256px;
      z-index: 0;
      opacity: 0.5;
    }

    .page { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 0 24px 80px; }

    /* ── Header ── */
    header {
      padding: 48px 0 32px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .header-top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1;
      color: var(--text);
      letter-spacing: -1px;
    }

    .logo span {
      display: inline-block;
      background: var(--yellow);
      padding: 2px 10px;
      border-radius: 8px;
      box-shadow: 2px 2px 0 rgba(44,36,23,0.15);
    }

    .tagline {
      font-size: 15px;
      color: var(--muted);
      font-weight: 500;
      margin-top: 4px;
    }

    /* ── Filters ── */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding-bottom: 32px;
    }

    .filter-btn {
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 700;
      padding: 6px 16px;
      border-radius: 100px;
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: all .15s ease;
      letter-spacing: 0.02em;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active {
      background: var(--text);
      border-color: var(--text);
      color: #fff;
    }

    /* ── Section title ── */
    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Bento Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 48px;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      border: 2px solid var(--border);
      box-shadow: var(--shadow);
      transition: transform .18s ease, box-shadow .18s ease;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .card:hover {
      transform: translateY(-3px) rotate(0.3deg);
      box-shadow: var(--shadow-hover);
    }

    .card-accent {
      height: 6px;
      width: 100%;
      border-radius: 0;
    }

    .card-body {
      padding: 18px 20px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 3px 10px;
      border-radius: 100px;
      align-self: flex-start;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text);
    }

    .card-desc {
      font-size: 13.5px;
      color: var(--muted);
      line-height: 1.5;
    }

    .card-meta {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: auto;
      padding-top: 8px;
    }

    /* ── PDF Card ── */
    .card-pdf .card-accent { background: var(--yellow); }
    .card-pdf .card-tag { background: var(--yellow); color: var(--yellow-d); }

    /* ── Podcast Card ── */
    .card-podcast .card-accent { background: var(--lavender); }
    .card-podcast .card-tag { background: var(--lavender); color: var(--lav-d); }

    /* ── Color variants for PDF cards ── */
    .color-pink .card-accent { background: var(--pink); }
    .color-pink .card-tag { background: var(--pink); color: var(--pink-d); }
    .color-mint .card-accent { background: var(--mint); }
    .color-mint .card-tag { background: var(--mint); color: var(--mint-d); }
    .color-sky .card-accent { background: var(--sky); }
    .color-sky .card-tag { background: var(--sky); color: var(--sky-d); }
    .color-peach .card-accent { background: var(--peach); }
    .color-peach .card-tag { background: var(--peach); color: var(--peach-d); }
    .color-lav .card-accent { background: var(--lavender); }
    .color-lav .card-tag { background: var(--lavender); color: var(--lav-d); }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .btn {
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 700;
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      border: 2px solid transparent;
      cursor: pointer;
      transition: all .15s ease;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }
    .btn-primary:hover { background: #4a3728; border-color: #4a3728; }

    .btn-outline {
      background: transparent;
      color: var(--muted);
      border-color: var(--border);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Audio player custom ── */
    .audio-player {
      margin-top: 10px;
      background: var(--surface2);
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      padding: 12px 14px;
    }

    .audio-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .play-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--text);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform .12s ease;
    }
    .play-btn:hover { transform: scale(1.08); }

    .play-icon, .pause-icon {
      width: 14px; height: 14px;
      fill: #fff;
      display: block;
    }
    .pause-icon { display: none; }

    .audio-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .audio-progress {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 100px;
      position: relative;
      cursor: pointer;
    }

    .audio-fill {
      height: 100%;
      background: var(--text);
      border-radius: 100px;
      width: 0%;
      transition: width .1s linear;
    }

    .audio-time {
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
    }

    /* ── PDF Modal ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(44,36,23,0.55);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 24px;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: var(--radius-lg);
      border: 2px solid var(--border);
      box-shadow: 8px 10px 0 rgba(44,36,23,0.15);
      width: 100%;
      max-width: 900px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 22px;
      border-bottom: 1.5px solid var(--border);
      flex-shrink: 0;
    }

    .modal-title {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
    }

    .modal-close {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--bg);
      border: 2px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      line-height: 1;
      color: var(--muted);
      transition: all .15s;
    }
    .modal-close:hover { background: var(--pink); border-color: var(--pink-d); color: var(--pink-d); }

    .modal-body {
      flex: 1;
      overflow: hidden;
    }

    .modal-body iframe {
      width: 100%;
      height: 100%;
      border: none;
      min-height: 60vh;
    }

    /* ── Download btn in modal ── */
    .modal-actions {
      padding: 12px 22px;
      border-top: 1.5px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-shrink: 0;
    }

    /* ── Empty state ── */
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 15px;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 32px 0 16px;
      font-size: 13px;
      color: var(--muted);
      border-top: 1.5px solid var(--border);
    }

    /* ── Sticker decorations ── */
    .sticker {
      position: absolute;
      font-size: 20px;
      opacity: 0.6;
      pointer-events: none;
      user-select: none;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
      .header-top { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<div class="page">
  <header>
    <div class="header-top">
      <div>
        <div class="logo">mes <span>révisions</span> ✦</div>
        <p class="tagline">Fiches de cours · Podcasts · Ressources</p>
      </div>
    </div>

    <!-- Filtres par matière — ajoute tes matières ici -->
    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="all">Tout voir</button>
      <!-- Les boutons de filtre sont générés automatiquement depuis DATA -->
    </div>
  </header>

  <!-- Section fiches PDF -->
  <div class="section-title" id="fiches-title">📄 Fiches de révision</div>
  <div class="grid" id="grid-fiches"></div>

  <!-- Section podcasts -->
  <div class="section-title" id="podcasts-title">🎙 Podcasts</div>
  <div class="grid" id="grid-podcasts"></div>

  <footer>
    Fait avec 🧡 pour réviser mieux · <a href="https://github.com" style="color:var(--accent)">GitHub</a>
  </footer>
</div>

<!-- Modal PDF viewer -->
<div class="modal-overlay" id="modal" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Fiche</span>
      <button class="modal-close" id="modal-close" aria-label="Fermer">✕</button>
    </div>
    <div class="modal-body">
      <iframe id="modal-iframe" title="Visualisation PDF"></iframe>
    </div>
    <div class="modal-actions">
      <a id="modal-download" class="btn btn-primary" download>
        ⬇ Télécharger
      </a>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   ✏️  DONNÉES À MODIFIER POUR AJOUTER DU CONTENU
   ═══════════════════════════════════════════════

   FICHES PDF :
   - title    : nom de la fiche
   - subject  : matière (ex: "Chimie", "Histoire") — doit correspondre au filtre
   - desc     : courte description (optionnel)
   - date     : date de création
   - color    : couleur du post-it  → "yellow" | "pink" | "mint" | "sky" | "peach" | "lav"
   - file     : chemin vers le PDF dans ton repo GitHub (ex: "fiches/chimie-acides.pdf")

   PODCASTS :
   - title    : nom du podcast
   - subject  : matière
   - desc     : description
   - date     : date
   - duration : durée (ex: "14:32")
   - file     : chemin vers le fichier audio (ex: "podcasts/cours-photosynthese.mp3")
                → supporte MP3, M4A, OGG
═══════════════════════════════════════════════ */

const FICHES = [
  {
    title: "Fiche de SES : La Socialisation ",
    subject: "SES",
    desc: ".",
    date: "Mai 2026",
    color: "yellow",
    file: "/fiches/fiche de SES, La Socialisation.pdf"
  },
    {
    title: "Fiche de SES : La Socialisation ",
    subject: "SES",
    desc: ".",
    date: "Mai 2026",
    color: "yellow",
    file: "/fiches/fiche de SES, La Socialisation.pdf"
  },
];

const PODCASTS = [
  {
    title: "lecture socialisation",
    subject: "SES",
    desc: ".",
    date: "mai 2026",
    duration: "15:22",
    file: "lecture/ses.mp3"
  },
];

/* ═══════════════════════════════════════════════
   CODE — pas besoin de modifier ce qui suit
═══════════════════════════════════════════════ */

const COLORS = {
  yellow: "card-pdf",
  pink:   "card-pdf color-pink",
  mint:   "card-pdf color-mint",
  sky:    "card-pdf color-sky",
  peach:  "card-pdf color-peach",
  lav:    "card-pdf color-lav"
};

let activeFilter = "all";
let audioElements = {};

function getAllSubjects() {
  const s = new Set();
  [...FICHES, ...PODCASTS].forEach(item => s.add(item.subject));
  return [...s].sort();
}

function buildFilters() {
  const container = document.getElementById("filters");
  getAllSubjects().forEach(subj => {
    const btn = document.createElement("button");
    btn.className = "filter-btn";
    btn.dataset.filter = subj;
    btn.textContent = subj;
    container.appendChild(btn);
  });
  container.addEventListener("click", e => {
    const btn = e.target.closest(".filter-btn");
    if (!btn) return;
    activeFilter = btn.dataset.filter;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.toggle("active", b === btn));
    render();
  });
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, "0")}`;
}

function buildPdfCard(fiche) {
  const colorClass = COLORS[fiche.color] || "card-pdf";
  const card = document.createElement("div");
  card.className = `card ${colorClass}`;
  card.dataset.subject = fiche.subject;

  card.innerHTML = `
    <div class="card-accent"></div>
    <div class="card-body">
      <span class="card-tag">📄 ${fiche.subject}</span>
      <div class="card-title">${fiche.title}</div>
      ${fiche.desc ? `<div class="card-desc">${fiche.desc}</div>` : ""}
      <div class="btn-row">
        <button class="btn btn-primary btn-view">👁 Visualiser</button>
        <a class="btn btn-outline" href="${fiche.file}" download>⬇ PDF</a>
      </div>
      <div class="card-meta">🗓 ${fiche.date}</div>
    </div>
  `;

  card.querySelector(".btn-view").addEventListener("click", () => openModal(fiche));
  return card;
}

function buildPodcastCard(podcast) {
  const card = document.createElement("div");
  card.className = "card card-podcast";
  card.dataset.subject = podcast.subject;

  const id = "audio_" + Math.random().toString(36).slice(2);

  card.innerHTML = `
    <div class="card-accent"></div>
    <div class="card-body">
      <span class="card-tag">🎙 ${podcast.subject}</span>
      <div class="card-title">${podcast.title}</div>
      ${podcast.desc ? `<div class="card-desc">${podcast.desc}</div>` : ""}
      <div class="audio-player">
        <div class="audio-controls">
          <button class="play-btn" id="play_${id}" aria-label="Lecture/Pause">
            <svg class="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <svg class="pause-icon" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
          <div class="audio-info">
            <div class="audio-progress" id="bar_${id}">
              <div class="audio-fill" id="fill_${id}"></div>
            </div>
            <div class="audio-time" id="time_${id}">0:00 / ${podcast.duration || "--:--"}</div>
          </div>
        </div>
        <audio id="${id}" preload="none" controlsList="nodownload">
          <source src="${podcast.file}" />
        </audio>
      </div>
      <div class="card-meta">🗓 ${podcast.date}${podcast.duration ? ` · ⏱ ${podcast.duration}` : ""}</div>
    </div>
  `;

  const audio = card.querySelector(`#${id}`);
  const playBtn = card.querySelector(`#play_${id}`);
  const fill = card.querySelector(`#fill_${id}`);
  const timeEl = card.querySelector(`#time_${id}`);
  const bar = card.querySelector(`#bar_${id}`);
  const playIcon = playBtn.querySelector(".play-icon");
  const pauseIcon = playBtn.querySelector(".pause-icon");

  audioElements[id] = audio;

  playBtn.addEventListener("click", () => {
    if (audio.paused) {
      // Pause tous les autres
      Object.values(audioElements).forEach(a => { if (a !== audio) a.pause(); });
      document.querySelectorAll(".play-icon").forEach(i => i.style.display = "block");
      document.querySelectorAll(".pause-icon").forEach(i => i.style.display = "none");
      audio.play();
      playIcon.style.display = "none";
      pauseIcon.style.display = "block";
    } else {
      audio.pause();
      playIcon.style.display = "block";
      pauseIcon.style.display = "none";
    }
  });

  audio.addEventListener("timeupdate", () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    fill.style.width = pct + "%";
    timeEl.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
  });

  audio.addEventListener("ended", () => {
    playIcon.style.display = "block";
    pauseIcon.style.display = "none";
    fill.style.width = "0%";
  });

  bar.addEventListener("click", e => {
    if (!audio.duration) return;
    const rect = bar.getBoundingClientRect();
    audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
  });

  // Empêcher le téléchargement via clic droit
  audio.addEventListener("contextmenu", e => e.preventDefault());

  return card;
}

function render() {
  const gridF = document.getElementById("grid-fiches");
  const gridP = document.getElementById("grid-podcasts");
  gridF.innerHTML = "";
  gridP.innerHTML = "";

  const fiches = FICHES.filter(f => activeFilter === "all" || f.subject === activeFilter);
  const podcasts = PODCASTS.filter(p => activeFilter === "all" || p.subject === activeFilter);

  if (fiches.length === 0) {
    gridF.innerHTML = `<div class="empty">Aucune fiche pour cette matière.</div>`;
  } else {
    fiches.forEach(f => gridF.appendChild(buildPdfCard(f)));
  }

  if (podcasts.length === 0) {
    gridP.innerHTML = `<div class="empty">Aucun podcast pour cette matière.</div>`;
  } else {
    podcasts.forEach(p => gridP.appendChild(buildPodcastCard(p)));
  }
}

// Modal PDF
function openModal(fiche) {
  document.getElementById("modal-title").textContent = fiche.title;
  document.getElementById("modal-iframe").src = fiche.file;
  document.getElementById("modal-download").href = fiche.file;
  document.getElementById("modal-download").download = fiche.file.split("/").pop();
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
  document.getElementById("modal-iframe").src = "";
  document.body.style.overflow = "";
}

document.getElementById("modal-close").addEventListener("click", closeModal);
document.getElementById("modal").addEventListener("click", e => {
  if (e.target === document.getElementById("modal")) closeModal();
});
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

// Init
buildFilters();
render();
</script>
</body>
</html>
